name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create generated directory
        run: mkdir -p assets/generated

      - name: Fetch stats card
        run: |
          curl -sL \
            "https://github-readme-stats.vercel.app/api?username=YACINBK&show_icons=true&count_private=true&include_all_commits=true&bg_color=050705&title_color=8FFF52&text_color=EEF6EF&icon_color=8FFF52&border_color=253128&rank_icon=github&hide_border=false&cache_seconds=1800" \
            -o assets/generated/stats-card.svg || true

      - name: Fetch top-langs card
        run: |
          curl -sL \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=YACINBK&layout=compact&count_private=true&bg_color=050705&title_color=8FFF52&text_color=EEF6EF&icon_color=8FFF52&border_color=253128&hide_border=false&cache_seconds=1800&langs_count=8" \
            -o assets/generated/top-langs.svg || true

      - name: Fetch activity graph
        run: |
          curl -sL \
            "https://github-readme-activity-graph.vercel.app/graph?username=YACINBK&bg_color=050705&color=8FFF52&line=8FFF52&point=C5FF00&area_color=132015&area=true&hide_border=false&border_color=253128&radius=6" \
            -o assets/generated/activity-graph.svg || true

      - name: Commit generated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats assets [skip ci]"
          git push
