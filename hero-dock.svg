<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dockBg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060806"/>
      <stop offset="0.52" stop-color="#09110B"/>
      <stop offset="1" stop-color="#060806"/>
    </linearGradient>
    <radialGradient id="dockGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 100) rotate(140) scale(380 240)">
      <stop stop-color="#8FFF52" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8FFF52" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dockGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#8FFF52" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .dockPulse { animation: dockPulse 3.4s ease-in-out infinite; transform-origin: center; }
      .dockFloat { animation: dockFloat 7s ease-in-out infinite; }
      .dockScan { animation: dockScan 5.2s linear infinite; }
      .dockBlink { animation: dockBlink 1.2s steps(1) infinite; }
      @keyframes dockPulse {
        0%, 100% { opacity: 0.52; transform: scale(0.99); }
        50% { opacity: 0.94; transform: scale(1.01); }
      }
      @keyframes dockFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes dockScan {
        0% { transform: translateX(-420px); opacity: 0; }
        10% { opacity: 0.32; }
        90% { opacity: 0.32; }
        100% { transform: translateX(1400px); opacity: 0; }
      }
      @keyframes dockBlink {
        0%, 54% { opacity: 1; }
        55%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#dockBg)"/>
  <rect width="1400" height="420" rx="28" fill="url(#dockGrid)"/>
  <rect width="1400" height="420" rx="28" fill="url(#dockGlow)"/>
  <rect x="2" y="2" width="1396" height="416" rx="26" stroke="#8FFF52" stroke-opacity="0.18" stroke-width="4"/>

  <rect class="dockScan" x="-420" y="44" width="420" height="332" rx="22" fill="url(#dockGlow)"/>

