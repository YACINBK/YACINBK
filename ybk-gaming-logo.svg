<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ybkEdge" x1="52" y1="44" x2="296" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D9FFB8"/>
      <stop offset="0.52" stop-color="#8FFF52"/>
      <stop offset="1" stop-color="#315227"/>
    </linearGradient>
    <radialGradient id="ybkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 90) rotate(124) scale(220 180)">
      <stop stop-color="#8FFF52" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#8FFF52" stop-opacity="0"/>
    </radialGradient>
    <filter id="ybkSoft" x="0" y="0" width="360" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .ybk-pulse { animation: ybkPulse 2.9s ease-in-out infinite; transform-origin: center; }
      .ybk-scan { animation: ybkScan 4.8s linear infinite; }
      .ybk-flicker { animation: ybkFlicker 2.1s ease-in-out infinite; }
      @keyframes ybkPulse {
        0%, 100% { opacity: 0.58; transform: scale(0.98); }
        50% { opacity: 0.96; transform: scale(1.02); }
      }
      @keyframes ybkScan {
        0% { transform: translateY(-180px); opacity: 0; }
        15% { opacity: 0.45; }
        85% { opacity: 0.45; }
        100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes ybkFlicker {
        0%, 100% { opacity: 1; }
        42% { opacity: 0.86; }
        48% { opacity: 1; }
        51% { opacity: 0.82; }
        58% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="20" y="20" width="320" height="320" rx="34" fill="#070A08"/>
  <rect x="20" y="20" width="320" height="320" rx="34" fill="url(#ybkGlow)"/>

  <g class="ybk-pulse" filter="url(#ybkSoft)">
    <path d="M180 42L293 106V252L180 318L67 252V106L180 42Z" stroke="#8FFF52" stroke-opacity="0.36" stroke-width="10"/>
  </g>

  <path d="M180 48L287 109V249L180 312L73 249V109L180 48Z" fill="#0B110D" stroke="url(#ybkEdge)" stroke-width="4"/>

  <path d="M64 102H296" stroke="#8FFF52" stroke-opacity="0.08"/>
  <path d="M64 259H296" stroke="#8FFF52" stroke-opacity="0.08"/>

  <path d="M112 113L148 153L180 113" stroke="#D9FFB8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M146 153V228" stroke="#D9FFB8" stroke-width="12" stroke-linecap="round"/>

  <path d="M178 113V228" stroke="#8FFF52" stroke-width="12" stroke-linecap="round"/>
  <path d="M178 113H218C235 113 246 125 246 140C246 154 235 165 219 165H178" stroke="#8FFF52" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M178 165H222C240 165 252 177 252 194C252 212 239 228 218 228H178" stroke="#8FFF52" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M258 113V228" stroke="#EEF6EF" stroke-width="12" stroke-linecap="round"/>
  <path d="M258 171L295 113" stroke="#EEF6EF" stroke-width="12" stroke-linecap="round"/>
  <path d="M258 171L297 228" stroke="#EEF6EF" stroke-width="12" stroke-linecap="round"/>

  <rect x="82" y="274" width="196" height="28" rx="14" fill="#0E150F" stroke="#8FFF52" stroke-opacity="0.32"/>
  <text x="180" y="293" text-anchor="middle" fill="#D9FFB8" font-family="'Courier New', monospace" font-size="14" letter-spacing="2.8">YBK // PLAYER ONE</text>

  <rect class="ybk-scan" x="58" y="0" width="244" height="28" rx="14" fill="url(#ybkGlow)"/>

  <g class="ybk-flicker">
    <path d="M76 90L92 90" stroke="#8FFF52" stroke-width="4" stroke-linecap="round"/>
