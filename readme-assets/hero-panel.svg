<svg width="1400" height="320" viewBox="0 0 1400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1400" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060806"/>
      <stop offset="0.52" stop-color="#0A100C"/>
      <stop offset="1" stop-color="#060806"/>
    </linearGradient>
    <linearGradient id="heroPanel" x1="0" y1="0" x2="920" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A100C"/>
      <stop offset="1" stop-color="#0B110D"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1142 82) rotate(144) scale(360 200)">
      <stop stop-color="#8FFF52" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8FFF52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crestGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 140) rotate(132) scale(180 150)">
      <stop stop-color="#8FFF52" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8FFF52" stop-opacity="0"/>
    </radialGradient>
    <pattern id="heroGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" stroke="#8FFF52" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .heroSweep { animation: heroSweep 7.8s linear infinite; }
      .crestFloat { animation: crestFloat 4.2s ease-in-out infinite; transform-origin: center; }
      @keyframes heroSweep {
        0% { transform: translateX(-280px); opacity: 0; }
        12% { opacity: 0.22; }
        88% { opacity: 0.22; }
        100% { transform: translateX(1400px); opacity: 0; }
      }
      @keyframes crestFloat {
        0%, 100% { transform: translateY(0px); opacity: 0.9; }
        50% { transform: translateY(-4px); opacity: 1; }
      }
    </style>
  </defs>

