<svg width="1400" height="108" viewBox="0 0 1400 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="activityBg" x1="0" y1="0" x2="1400" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A08"/>
      <stop offset="0.58" stop-color="#0A110C"/>
      <stop offset="1" stop-color="#070A08"/>
    </linearGradient>
    <style>
      .sweep { animation: sweep 7.4s linear infinite; }
      @keyframes sweep {
        0% { transform: translateX(-220px); opacity: 0; }
        14% { opacity: 0.35; }
        86% { opacity: 0.35; }
        100% { transform: translateX(1400px); opacity: 0; }
      }
    </style>
  </defs>
  <rect width="1400" height="108" rx="20" fill="url(#activityBg)"/>
  <rect x="2" y="2" width="1396" height="104" rx="18" stroke="#8FFF52" stroke-opacity="0.16" stroke-width="4"/>
  <text x="48" y="48" fill="#F1F8EE" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="30">Activity</text>
  <text x="48" y="78" fill="#9DDB7D" font-family="'Courier New', monospace" font-size="20" letter-spacing="2">Live GitHub signals</text>
  <rect class="sweep" x="-220" y="88" width="220" height="4" rx="2" fill="#8FFF52"/>
</svg>
