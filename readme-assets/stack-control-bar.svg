<svg width="1400" height="124" viewBox="0 0 1400 124" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barBg" x1="0" y1="0" x2="1400" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05080C"/>
      <stop offset="0.54" stop-color="#0A1420"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(208 30) rotate(90) scale(110 320)">
      <stop stop-color="#8FFF52" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8FFF52" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#00D8FF" fill-opacity="0.08"/>
    </pattern>
    <style>
      .scan { animation: scan 7s linear infinite; }
      .float { animation: float 2.8s ease-in-out infinite; }
      .pulse { animation: pulse 2.1s ease-in-out infinite; }
      @keyframes scan {
        0% { transform: translateX(-220px); opacity: 0; }
        20% { opacity: 0.45; }
        80% { opacity: 0.45; }
        100% { transform: translateX(1400px); opacity: 0; }
      }
      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      @keyframes pulse {
        0%,100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  <rect width="1400" height="124" rx="22" fill="url(#barBg)"/>
  <rect width="1400" height="124" rx="22" fill="url(#dots)"/>
  <rect width="1400" height="124" rx="22" fill="url(#glow)"/>
  <circle cx="150" cy="36" r="22" fill="#8FFF52" fill-opacity="0.12" class="float"/>
  <circle cx="150" cy="36" r="10" fill="#00D8FF" class="pulse"/>
  <path d="M48 34H146" stroke="#00D8FF" stroke-width="3" stroke-linecap="round"/>
  <text x="48" y="52" fill="#F5FBFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="38">Stack</text>
  <text x="48" y="100" fill="#D6E6F2" font-family="'Segoe UI', Arial, sans-serif" font-size="22">Languages, frameworks, and delivery tools I actually ship with.</text>
  <rect class="scan" x="-220" y="104" width="220" height="3" rx="2" fill="#C5FF00"/>
</svg>
