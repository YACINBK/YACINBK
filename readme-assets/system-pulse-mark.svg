<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markBg" x1="18" y1="18" x2="222" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04070B"/>
      <stop offset="0.52" stop-color="#08111A"/>
      <stop offset="1" stop-color="#040609"/>
    </linearGradient>
    <radialGradient id="markGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 120) rotate(90) scale(92 92)">
      <stop stop-color="#00D8FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#00D8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="markLime" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(174 68) rotate(130) scale(74 74)">
      <stop stop-color="#C5FF00" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#C5FF00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="markDots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="0.7" fill="#8FD4FF" fill-opacity="0.12"/>
    </pattern>
    <filter id="markBlur" x="0" y="0" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .markHalo {
        animation: markHalo 4.8s ease-in-out infinite;
        transform-origin: 120px 120px;
      }
      .markSweep {
        animation: markSweep 10s linear infinite;
        transform-origin: 120px 120px;
      }
      .markCore {
        animation: markCore 4.8s ease-in-out infinite;
        transform-origin: 120px 120px;
      }
      @keyframes markHalo {
        0%, 100% { opacity: 0.56; transform: scale(0.97); }
        50% { opacity: 1; transform: scale(1.035); }
      }
      @keyframes markSweep {
        0% { transform: rotate(0deg); opacity: 0.28; }
        50% { opacity: 0.72; }
        100% { transform: rotate(360deg); opacity: 0.28; }
      }
      @keyframes markCore {
        0%, 100% { transform: scale(0.99); }
        50% { transform: scale(1.03); }
      }
    </style>
  </defs>

  <rect x="18" y="18" width="204" height="204" rx="30" fill="url(#markBg)"/>
  <rect x="18" y="18" width="204" height="204" rx="30" fill="url(#markDots)"/>
  <rect x="18" y="18" width="204" height="204" rx="30" fill="url(#markLime)"/>
  <rect x="19.5" y="19.5" width="201" height="201" rx="28.5" stroke="#7ECFFF" stroke-opacity="0.2" stroke-width="3"/>

  <g class="markHalo" filter="url(#markBlur)">
    <circle cx="120" cy="120" r="72" fill="url(#markGlow)"/>
  </g>

  <circle cx="120" cy="120" r="78" stroke="#F2FBFF" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="120" cy="120" r="60" stroke="#00D8FF" stroke-opacity="0.42" stroke-width="3" stroke-dasharray="3 8"/>
  <circle cx="120" cy="120" r="42" stroke="#00D8FF" stroke-opacity="0.28" stroke-width="2"/>

  <g class="markSweep">
    <path d="M120 54A66 66 0 0 1 175 84" stroke="#C5FF00" stroke-width="6" stroke-linecap="round"/>
    <path d="M167 155A66 66 0 0 1 130 186" stroke="#00D8FF" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g class="markCore">
    <path d="M120 66L160 90V138L120 162L80 138V90L120 66Z" stroke="#EAFBFF" stroke-width="3"/>
    <rect x="105" y="105" width="30" height="30" stroke="#00D8FF" stroke-width="3"/>
    <circle cx="120" cy="86" r="7" fill="#C5FF00"/>
    <circle cx="154" cy="105" r="7" fill="#00D8FF"/>
    <circle cx="154" cy="135" r="7" fill="#C5FF00"/>
    <circle cx="120" cy="154" r="7" fill="#00D8FF"/>
    <circle cx="86" cy="135" r="7" fill="#C5FF00"/>
    <circle cx="86" cy="105" r="7" fill="#00D8FF"/>
    <path d="M120 86V105" stroke="#EAFBFF" stroke-width="3"/>
    <path d="M147 109L133 116" stroke="#EAFBFF" stroke-width="3"/>
    <path d="M147 131L133 124" stroke="#EAFBFF" stroke-width="3"/>
    <path d="M120 147V135" stroke="#EAFBFF" stroke-width="3"/>
    <path d="M93 131L107 124" stroke="#EAFBFF" stroke-width="3"/>
    <path d="M93 109L107 116" stroke="#EAFBFF" stroke-width="3"/>
  </g>

  <path d="M52 120H76" stroke="#00D8FF" stroke-opacity="0.32" stroke-width="2"/>
  <path d="M164 120H188" stroke="#00D8FF" stroke-opacity="0.32" stroke-width="2"/>
  <path d="M120 52V76" stroke="#00D8FF" stroke-opacity="0.32" stroke-width="2"/>
  <path d="M120 164V188" stroke="#00D8FF" stroke-opacity="0.32" stroke-width="2"/>
  <path d="M54 70H78V56" stroke="#C5FF00" stroke-opacity="0.66" stroke-width="3"/>
  <path d="M186 170H162V184" stroke="#C5FF00" stroke-opacity="0.66" stroke-width="3"/>
</svg>
