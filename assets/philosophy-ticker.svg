<svg viewBox="0 0 860 80" xmlns="http://www.w3.org/2000/svg" width="860" height="80">
  <defs>
    <style>

      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }

      @keyframes marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }

      .ticker { animation: marquee 28s linear infinite; }
    </style>
  </defs>

  <rect width="860" height="80" fill="#050705"/>

  <!-- Top rule -->
  <line x1="0" y1="0" x2="860" y2="0" stroke="#132015" stroke-width="1"/>

  <!-- Section label -->
  <rect x="0" y="0" width="3" height="80" fill="#8FFF52" opacity="0.5"/>
  <text x="18" y="20" class="mono" font-size="9" fill="#8FFF52" letter-spacing="2">// PHILOSOPHY</text>
  <line x1="18" y1="26" x2="842" y2="26" stroke="#132015" stroke-width="1"/>

  <!-- Scrolling ticker -->
  <clipPath id="clip"><rect x="0" y="30" width="860" height="36"/></clipPath>
  <g clip-path="url(#clip)">
    <g class="ticker">
      <!-- Two copies for seamless loop -->
      <text y="52" class="mono" font-size="13" fill="#EEF6EF" letter-spacing="1">
        <tspan x="20">FAILURE IS A DESIGN INPUT</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">CACHE BEFORE YOU SCALE</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#EEF6EF">EXPLICIT FALLBACKS ALWAYS</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">SECURE BY DEFAULT</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#EEF6EF">DESIGN FIRST, OPTIMIZE LATER</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">SHIP UNDER REAL CONSTRAINTS</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>

        <!-- repeat -->
        <tspan dx="80" fill="#EEF6EF">FAILURE IS A DESIGN INPUT</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">CACHE BEFORE YOU SCALE</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#EEF6EF">EXPLICIT FALLBACKS ALWAYS</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">SECURE BY DEFAULT</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#EEF6EF">DESIGN FIRST, OPTIMIZE LATER</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
        <tspan dx="48" fill="#8CA08A">SHIP UNDER REAL CONSTRAINTS</tspan>
        <tspan dx="48" fill="#8FFF52">·</tspan>
      </text>
    </g>
  </g>

  <!-- Bottom rule -->
  <line x1="0" y1="79" x2="860" y2="79" stroke="#132015" stroke-width="1"/>
</svg>
