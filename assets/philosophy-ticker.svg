<svg xmlns="http://www.w3.org/2000/svg" width="860" height="70" viewBox="0 0 860 70" role="img" aria-label="Philosophy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b0f0c"/>
      <stop offset="50%" stop-color="#111a12"/>
      <stop offset="100%" stop-color="#0b0f0c"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Segoe UI', 'Inter', Arial, sans-serif; }
      @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      .ticker { animation: marquee 22s linear infinite; }
    </style>
  </defs>
  <rect width="860" height="70" rx="12" fill="#050705"/>
  <rect width="860" height="70" rx="12" fill="url(#bg)" opacity="0.5"/>
  <rect x="12" y="12" width="836" height="46" rx="10" fill="none" stroke="#1f2b22"/>
  <text x="28" y="28" class="mono" font-size="10" fill="#8FFF52" letter-spacing="2">// PHILOSOPHY</text>
  <clipPath id="clip"><rect x="20" y="34" width="820" height="22"/></clipPath>
  <g clip-path="url(#clip)">
    <g class="ticker" fill="#E5F5E5" font-size="12" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="1">
      <text y="50">
        <tspan x="26">FAILURE IS A DESIGN INPUT</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#8CA08A">CACHE BEFORE YOU SCALE</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#E5F5E5">EXPLICIT FALLBACKS ALWAYS</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#8CA08A">SECURE BY DEFAULT</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#E5F5E5">DESIGN FIRST, OPTIMIZE LATER</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#8CA08A">SHIP UNDER REAL CONSTRAINTS</tspan>
        <tspan dx="60" fill="#E5F5E5">FAILURE IS A DESIGN INPUT</tspan>
        <tspan dx="40" fill="#8FFF52">·</tspan>
        <tspan dx="40" fill="#8CA08A">CACHE BEFORE YOU SCALE</tspan>
      </text>
    </g>
  </g>
</svg>
