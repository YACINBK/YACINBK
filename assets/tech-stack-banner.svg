<svg xmlns="http://www.w3.org/2000/svg" width="860" height="120" viewBox="0 0 860 120" role="img" aria-label="Tech Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b0f0c"/>
      <stop offset="50%" stop-color="#111a12"/>
      <stop offset="100%" stop-color="#0b0f0c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8FFF52" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8FFF52" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8FFF52" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="860" height="120" rx="16" fill="#050705"/>
  <rect width="860" height="120" rx="16" fill="url(#bg)" opacity="0.55"/>
  <rect width="860" height="120" rx="16" fill="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="12" width="836" height="96" rx="12" fill="none" stroke="#1f2b22"/>
  <text x="28" y="34" fill="#8FFF52" font-size="10" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="2">// TECH STACK</text>
  <text x="28" y="66" fill="#E5F5E5" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Languages · Frameworks · Infrastructure</text>
  <text x="28" y="90" fill="#8CA08A" font-size="12" font-family="Segoe UI, Inter, Arial, sans-serif">Production-ready tooling across AI, backend, and modern web stacks.</text>
</svg>
