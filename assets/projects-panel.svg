<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" width="860" height="220">
  <defs>
    <style>

      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .orb  { font-family: 'Orbitron', 'Courier New', monospace; font-weight: 700; }

      @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
      @keyframes glow    { 0%,100%{filter:drop-shadow(0 0 4px #8FFF52)} 50%{filter:drop-shadow(0 0 12px #8FFF52)} }
      @keyframes scanLine { from{transform:translateY(-220px)} to{transform:translateY(440px)} }

      .c1 { animation: slideUp 0.5s 0.1s ease both; }
      .c2 { animation: slideUp 0.5s 0.25s ease both; }
      .c3 { animation: slideUp 0.5s 0.4s ease both; }
    </style>

    <pattern id="g3" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#0c160e" stroke-width="0.6"/>
    </pattern>

    <filter id="gf3">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="220" fill="#050705"/>
  <rect width="860" height="220" fill="url(#g3)"/>

  <!-- Scanline -->
  <rect width="860" height="1.5" fill="#8FFF52" opacity="0.05">
    <animateTransform attributeName="transform" type="translate" from="0,-220" to="0,440" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Section label -->
  <rect x="0" y="0" width="3" height="220" fill="#253128"/>
  <text x="18" y="20" class="mono" font-size="9" fill="#8FFF52" letter-spacing="2">// FEATURED PROJECTS</text>
  <line x1="18" y1="26" x2="842" y2="26" stroke="#132015" stroke-width="1"/>

  <!-- ── PROJECT 1: UX Insight Platform ── -->
  <g class="c1">
    <rect x="18" y="36" width="262" height="168" rx="5" fill="#07100A" stroke="#1a2e1c"/>
    <!-- accent top bar -->
    <rect x="18" y="36" width="262" height="3" rx="2" fill="#8FFF52" opacity="0.7"/>

    <text x="30" y="60" class="orb" font-size="11" fill="#8FFF52" letter-spacing="1">UX INSIGHT PLATFORM</text>
    <line x1="30" y1="66" x2="268" y2="66" stroke="#132015" stroke-width="1"/>

    <text x="30" y="82" class="mono" font-size="9.5" fill="#8CA08A">Provider-agnostic UX analysis platform</text>
    <text x="30" y="96" class="mono" font-size="9.5" fill="#8CA08A">with clear service separation. Spring Boot</text>
    <text x="30" y="110" class="mono" font-size="9.5" fill="#8CA08A">API gateway → 2 FastAPI services. Full</text>
    <text x="30" y="124" class="mono" font-size="9.5" fill="#8CA08A">stack boots with docker-compose up.</text>

    <line x1="30" y1="136" x2="268" y2="136" stroke="#132015" stroke-width="0.8"/>

    <!-- Tags -->
    <rect x="30"  y="144" width="68" height="16" rx="3" fill="#0e1a10"/>
    <text x="36"  y="155" class="mono" font-size="8" fill="#8FFF52">Spring Boot</text>
    <rect x="104" y="144" width="48" height="16" rx="3" fill="#0e1a10"/>
    <text x="110" y="155" class="mono" font-size="8" fill="#8FFF52">FastAPI</text>
    <rect x="158" y="144" width="58" height="16" rx="3" fill="#0e1a10"/>
    <text x="164" y="155" class="mono" font-size="8" fill="#C5FF00">ChromaDB</text>

    <rect x="30"  y="164" width="44" height="16" rx="3" fill="#0e1a10"/>
    <text x="36"  y="175" class="mono" font-size="8" fill="#D9FFB8">Angular</text>
    <rect x="80"  y="164" width="36" height="16" rx="3" fill="#0e1a10"/>
    <text x="86"  y="175" class="mono" font-size="8" fill="#D9FFB8">OCR</text>
    <rect x="122" y="164" width="50" height="16" rx="3" fill="#0e1a10"/>
    <text x="128" y="175" class="mono" font-size="8" fill="#8CA08A">Docker</text>
    <rect x="178" y="164" width="68" height="16" rx="3" fill="#0e1a10"/>
    <text x="184" y="175" class="mono" font-size="8" fill="#8CA08A">PostgreSQL</text>

    <text x="30" y="198" class="mono" font-size="9" fill="#253128">internship @ Whitecape Technologies</text>
  </g>

  <!-- ── PROJECT 2: QuickFlow ── -->
  <g class="c2">
    <rect x="296" y="36" width="262" height="168" rx="5" fill="#07100A" stroke="#1a2e1c"/>
    <rect x="296" y="36" width="262" height="3" rx="2" fill="#C5FF00" opacity="0.7"/>

    <text x="308" y="60" class="orb" font-size="11" fill="#C5FF00" letter-spacing="1">QUICKFLOW</text>
    <line x1="308" y1="66" x2="546" y2="66" stroke="#132015" stroke-width="1"/>

    <text x="308" y="82" class="mono" font-size="9.5" fill="#8CA08A">AI productivity suite — meeting minutes</text>
    <text x="308" y="96" class="mono" font-size="9.5" fill="#8CA08A">and email drafting. OAuth2 + TOTP + JWT</text>
    <text x="308" y="110" class="mono" font-size="9.5" fill="#8CA08A">auth architecture. Ollama inference with</text>
    <text x="308" y="124" class="mono" font-size="9.5" fill="#8CA08A">caching under concurrent load.</text>

    <line x1="308" y1="136" x2="546" y2="136" stroke="#132015" stroke-width="0.8"/>

    <rect x="308" y="144" width="66" height="16" rx="3" fill="#0e1a10"/>
    <text x="314" y="155" class="mono" font-size="8" fill="#C5FF00">Spring AI</text>
    <rect x="380" y="144" width="72" height="16" rx="3" fill="#0e1a10"/>
    <text x="386" y="155" class="mono" font-size="8" fill="#C5FF00">Spring Sec.</text>
    <rect x="458" y="144" width="50" height="16" rx="3" fill="#0e1a10"/>
    <text x="464" y="155" class="mono" font-size="8" fill="#8FFF52">Ollama</text>

    <rect x="308" y="164" width="40" height="16" rx="3" fill="#0e1a10"/>
    <text x="314" y="175" class="mono" font-size="8" fill="#D9FFB8">React</text>
    <rect x="354" y="164" width="52" height="16" rx="3" fill="#0e1a10"/>
    <text x="360" y="175" class="mono" font-size="8" fill="#D9FFB8">MongoDB</text>
    <rect x="412" y="164" width="54" height="16" rx="3" fill="#0e1a10"/>
    <text x="418" y="175" class="mono" font-size="8" fill="#8CA08A">Whisper</text>

    <text x="308" y="198" class="mono" font-size="9" fill="#253128">auth ownership · data orchestration</text>
  </g>

  <!-- ── PROJECT 3: Smart City ── -->
  <g class="c3">
    <rect x="574" y="36" width="268" height="168" rx="5" fill="#07100A" stroke="#1a2e1c"/>
    <rect x="574" y="36" width="268" height="3" rx="2" fill="#00D8FF" opacity="0.6"/>

    <text x="586" y="55" class="orb" font-size="10" fill="#00D8FF" letter-spacing="1">SMART CITY SOUSSE 2030</text>
    <line x1="586" y1="66" x2="830" y2="66" stroke="#132015" stroke-width="1"/>

    <text x="586" y="82" class="mono" font-size="9.5" fill="#8CA08A">Urban ops platform — French NL→SQL</text>
    <text x="586" y="96" class="mono" font-size="9.5" fill="#8CA08A">compiler, FSMs, AI reporting, Streamlit</text>
    <text x="586" y="110" class="mono" font-size="9.5" fill="#8CA08A">dashboard. Offline-first is a first-class</text>
    <text x="586" y="124" class="mono" font-size="9.5" fill="#8CA08A">design requirement.</text>

    <line x1="586" y1="136" x2="830" y2="136" stroke="#132015" stroke-width="0.8"/>

    <rect x="586" y="144" width="40" height="16" rx="3" fill="#0e1a10"/>
    <text x="592" y="155" class="mono" font-size="8" fill="#00D8FF">Python</text>
    <rect x="632" y="144" width="70" height="16" rx="3" fill="#0e1a10"/>
    <text x="638" y="155" class="mono" font-size="8" fill="#00D8FF">PostgreSQL</text>
    <rect x="708" y="144" width="62" height="16" rx="3" fill="#0e1a10"/>
    <text x="714" y="155" class="mono" font-size="8" fill="#8FFF52">Streamlit</text>

    <rect x="586" y="164" width="30" height="16" rx="3" fill="#0e1a10"/>
    <text x="592" y="175" class="mono" font-size="8" fill="#D9FFB8">FSM</text>
    <rect x="622" y="164" width="80" height="16" rx="3" fill="#0e1a10"/>
    <text x="628" y="175" class="mono" font-size="8" fill="#D9FFB8">NL→SQL Compiler</text>
    <rect x="708" y="164" width="70" height="16" rx="3" fill="#0e1a10"/>
    <text x="714" y="175" class="mono" font-size="8" fill="#8CA08A">AI Reports</text>

    <text x="586" y="198" class="mono" font-size="9" fill="#253128">offline-capable · operational dashboard</text>
  </g>

  <!-- Bottom border -->
  <line x1="18" y1="210" x2="842" y2="210" stroke="#132015" stroke-width="1"/>
  <text x="18" y="220" class="mono" font-size="8" fill="#132015" letter-spacing="1">GITHUB.COM/YACINBK</text>
</svg>
