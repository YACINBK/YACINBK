<svg viewBox="0 0 860 110" xmlns="http://www.w3.org/2000/svg" width="860" height="110">
  <defs>
    <style>

      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .orb  { font-family: 'Orbitron', 'Courier New', monospace; font-weight: 900; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes glow   { 0%,100%{filter:drop-shadow(0 0 4px #8FFF52)} 50%{filter:drop-shadow(0 0 14px #8FFF52)} }
      @keyframes scan   { from{transform:translateY(-110px)} to{transform:translateY(220px)} }

      .name-line  { animation: fadeUp 0.6s ease both; }
      .role-line  { animation: fadeUp 0.6s 0.3s ease both; }
      .tag-line   { animation: fadeUp 0.6s 0.6s ease both; }
      .cursor     { animation: blink 1s step-end infinite; }
      .glow-green { animation: glow 3s ease-in-out infinite; }
    </style>

    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#1a2e1c"/>
    </pattern>

    <filter id="gf">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8FFF52"/>
      <stop offset="60%" stop-color="#C5FF00"/>
      <stop offset="100%" stop-color="#8FFF52"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="860" height="110" fill="#050705"/>
  <rect width="860" height="110" fill="url(#dots)"/>

  <!-- Scanline -->
  <rect width="860" height="1.5" fill="#8FFF52" opacity="0.06">
    <animateTransform attributeName="transform" type="translate" from="0,-110" to="0,220" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="110" fill="#8FFF52" opacity="0.9" class="glow-green"/>

  <!-- Corner brackets -->
  <polyline points="3,22 3,3 22,3"   fill="none" stroke="#8FFF52" stroke-width="1.5"/>
  <polyline points="838,3 857,3 857,22"  fill="none" stroke="#253128" stroke-width="1.2"/>
  <polyline points="3,88 3,107 22,107"  fill="none" stroke="#253128" stroke-width="1.2"/>
  <polyline points="838,107 857,107 857,88" fill="none" stroke="#8FFF52" stroke-width="1.5"/>

  <!-- Status dot -->
  <circle cx="30" cy="18" r="4" fill="#8FFF52" filter="url(#gf)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="22" class="mono" font-size="9" fill="#253128" letter-spacing="1">SYSTEM ONLINE</text>

  <!-- Name -->
  <text x="22" y="62" class="orb name-line" font-size="34" fill="url(#nameGrad)" letter-spacing="4" filter="url(#gf)">YACIN BEN KACEM</text>

  <!-- Role line -->
  <text x="22" y="84" class="mono role-line" font-size="12" fill="#8CA08A" letter-spacing="2">BACKEND ENGINEER  ·  AGENTIC SYSTEMS  ·  ENISo</text>

  <!-- Tag line with cursor -->
  <text x="22" y="102" class="mono tag-line" font-size="11" fill="#253128" letter-spacing="1">$ architecting systems that survive real-world failure</text>
  <rect x="544" y="91" width="6" height="12" fill="#8FFF52" class="cursor"/>
</svg>
