<svg xmlns="http://www.w3.org/2000/svg" width="860" height="140" viewBox="0 0 860 140" role="img" aria-label="Core Expertise">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b0f0c"/>
      <stop offset="50%" stop-color="#111a12"/>
      <stop offset="100%" stop-color="#0b0f0c"/>
    </linearGradient>
  </defs>
  <rect width="860" height="140" rx="16" fill="#050705"/>
  <rect width="860" height="140" rx="16" fill="url(#bg)" opacity="0.45"/>
  <rect x="12" y="12" width="836" height="116" rx="12" fill="none" stroke="#1f2b22"/>
  <text x="28" y="30" fill="#8FFF52" font-size="10" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="2">// CORE EXPERTISE</text>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#E5F5E5" font-weight="600">
    <text x="28" y="58">Agentic Systems</text>
    <text x="310" y="58">Backend Engineering</text>
    <text x="592" y="58">Automation Workflows</text>
  </g>

  <g fill="#0e160f" stroke="#1f2b22">
    <rect x="28" y="68" width="240" height="12" rx="6"/>
    <rect x="310" y="68" width="240" height="12" rx="6"/>
    <rect x="592" y="68" width="240" height="12" rx="6"/>
  </g>

  <rect x="28" y="68" width="210" height="12" rx="6" fill="#8FFF52">
    <animate attributeName="width" values="160;210;160" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="310" y="68" width="200" height="12" rx="6" fill="#C5FF00">
    <animate attributeName="width" values="160;200;160" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="592" y="68" width="190" height="12" rx="6" fill="#8FFF52">
    <animate attributeName="width" values="150;190;150" dur="5s" repeatCount="indefinite"/>
  </rect>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="11" fill="#8CA08A">
    <text x="28" y="100">Tool routing · resilient workflows · automation</text>
    <text x="310" y="100">API design · secure services · platform delivery</text>
    <text x="592" y="100">Agent chains · integrations · automation ops</text>
  </g>

  <line x1="28" y1="114" x2="832" y2="114" stroke="#1f2b22"/>
  <text x="28" y="130" fill="#8FFF52" font-size="10" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="1">OPEN TO INTERNSHIPS · BACKEND · AGENTIC AI · AUTOMATION</text>
</svg>
