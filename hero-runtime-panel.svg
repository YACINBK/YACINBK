  <circle cx="158" cy="74" r="4" fill="#00D8FF" class="float"/>
  <circle cx="176" cy="74" r="7" fill="#8FFF52" class="pulse"/>
  <path d="M132 74H182" stroke="#253128" stroke-width="1"/>

