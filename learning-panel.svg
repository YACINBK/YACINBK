<svg width="1400" height="240" viewBox="0 0 1400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="learningPanelBg" x1="0" y1="0" x2="1400" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060806"/>
      <stop offset="1" stop-color="#09100B"/>
    </linearGradient>
    <style>
      .learnPulseA { animation: learnPulse 2.8s ease-in-out infinite; }
      .learnPulseB { animation: learnPulse 2.8s ease-in-out infinite 0.5s; }
      .learnPulseC { animation: learnPulse 2.8s ease-in-out infinite 1s; }
      .learnPulseD { animation: learnPulse 2.8s ease-in-out infinite 1.5s; }
      @keyframes learnPulse {
        0%, 100% { opacity: 0.5; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1.08); }
      }
    </style>
  </defs>
  <rect width="1400" height="240" rx="24" fill="url(#learningPanelBg)"/>
  <rect x="2" y="2" width="1396" height="236" rx="22" stroke="#8FFF52" stroke-opacity="0.16" stroke-width="4"/>
  <path d="M130 142H1270" stroke="#8FFF52" stroke-opacity="0.24" stroke-width="4"/>

  <circle class="learnPulseA" cx="180" cy="142" r="16" fill="#8FFF52"/>
  <circle class="learnPulseB" cx="506" cy="142" r="16" fill="#8FFF52"/>
  <circle class="learnPulseC" cx="842" cy="142" r="16" fill="#8FFF52"/>
  <circle class="learnPulseD" cx="1178" cy="142" r="16" fill="#8FFF52"/>

  <text x="180" y="102" text-anchor="middle" fill="#EEF6EF" font-family="'Arial Black', 'Segoe UI', sans-serif" font-size="28">ENISo</text>
  <text x="180" y="182" text-anchor="middle" fill="#A8B5AA" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Applied CS Engineering</text>

  <text x="506" y="102" text-anchor="middle" fill="#EEF6EF" font-family="'Arial Black', 'Segoe UI', sans-serif" font-size="28">Whitecape</text>
  <text x="506" y="182" text-anchor="middle" fill="#A8B5AA" font-family="'Segoe UI', Arial, sans-serif" font-size="18">AI-assisted UX analysis</text>

  <text x="842" y="102" text-anchor="middle" fill="#EEF6EF" font-family="'Arial Black', 'Segoe UI', sans-serif" font-size="28">NVIDIA + DLAI</text>
  <text x="842" y="182" text-anchor="middle" fill="#A8B5AA" font-family="'Segoe UI', Arial, sans-serif" font-size="18">continuous hands-on study</text>

  <text x="1178" y="102" text-anchor="middle" fill="#EEF6EF" font-family="'Arial Black', 'Segoe UI', sans-serif" font-size="28">Next Build</text>
  <text x="1178" y="182" text-anchor="middle" fill="#A8B5AA" font-family="'Segoe UI', Arial, sans-serif" font-size="18">agentic systems that ship</text>
</svg>
